<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Book Appointment - BloomCare Admin</title>
    <link rel="stylesheet" href="/webjars/bootstrap/5.3.2/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="/webjars/font-awesome/6.5.2/css/all.min.css"/>
    <link rel="stylesheet" href="/css/styles.css"/>
</head>
<body>
<div class="admin-layout">
    <aside class="sidebar bg-glass shadow-soft">
        <div class="sidebar-brand mb-5">
            <h4>BloomCare</h4>
            <p>Admin Panel</p>
        </div>
        <ul class="sidebar-nav list-unstyled">
            <li><a href="/admin/dashboard"><i class="fa-solid fa-chart-pie"></i> Dashboard</a></li>
            <li><a href="/admin/patients"><i class="fa-solid fa-user-injured"></i> Patients</a></li>
            <li><a href="/admin/doctors"><i class="fa-solid fa-user-doctor"></i> Doctors</a></li>
            <li><a href="/admin/appointments"><i class="fa-solid fa-calendar-check"></i> Appointments</a></li>
            <li><a href="/logout"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>
        </ul>
    </aside>
    <main class="admin-main p-4">
        <div class="mb-4">
            <h2>Book Appointment</h2>
            <p class="text-muted">Record a new appointment for a patient.</p>
        </div>
        <div class="rounded-4 shadow-soft bg-white p-4">
            <form th:action="@{/admin/appointments/save}" th:object="${appointment}" method="post">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Patient Name</label>
                        <input type="text" th:field="*{patientName}" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Doctor Selection</label>
                        <input type="text" th:field="*{doctorName}" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Department</label>
                        <input type="text" th:field="*{department}" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Appointment Date</label>
                        <input type="date" th:field="*{appointmentDate}" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Appointment Time</label>
                        <input type="time" th:field="*{appointmentTime}" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Contact Number</label>
                        <input type="text" th:field="*{contactNumber}" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Status</label>
                        <select th:field="*{status}" class="form-select" required>
                            <option value="Pending">Pending</option>
                            <option value="Confirmed">Confirmed</option>
                            <option value="Completed">Completed</option>
                            <option value="Cancelled">Cancelled</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Symptoms</label>
                        <textarea th:field="*{symptoms}" class="form-control" rows="3"></textarea>
                    </div>
                </div>
                <div class="mt-4">
                    <button type="submit" class="btn btn-pink">Save Appointment</button>
                    <a href="/admin/appointments" class="btn btn-outline-secondary ms-2">Cancel</a>
                </div>
            </form>
        </div>
    </main>
</div>
<script src="/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>

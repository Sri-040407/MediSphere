<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Doctors - BloomCare Admin</title>
    <link rel="stylesheet" href="/webjars/bootstrap/5.3.2/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="/webjars/font-awesome/6.5.2/css/all.min.css"/>
    <link rel="stylesheet" href="/css/styles.css"/>
</head>
<body>
<div class="admin-layout">
    <aside class="sidebar bg-glass shadow-soft">
        <div class="sidebar-brand mb-5">
            <h4>BloomCare</h4>
            <p>Admin Panel</p>
        </div>
        <ul class="sidebar-nav list-unstyled">
            <li><a href="/admin/dashboard"><i class="fa-solid fa-chart-pie"></i> Dashboard</a></li>
            <li><a href="/admin/patients"><i class="fa-solid fa-user-injured"></i> Patients</a></li>
            <li><a href="/admin/doctors"><i class="fa-solid fa-user-doctor"></i> Doctors</a></li>
            <li><a href="/admin/appointments"><i class="fa-solid fa-calendar-check"></i> Appointments</a></li>
            <li><a href="/logout"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>
        </ul>
    </aside>
    <main class="admin-main p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2>Doctor Management</h2>
                <p class="text-muted">Manage doctor profiles and availability.</p>
            </div>
            <a href="/admin/doctors/add" class="btn btn-pink">Add Doctor</a>
        </div>
        <div class="row g-4">
            <div class="col-md-6 col-lg-4" th:each="doctor : ${doctors}">
                <div class="profile-card rounded-4 shadow-soft bg-white p-4 text-center">
                    <div class="profile-avatar rounded-circle bg-soft mx-auto mb-3">
                        <i class="fa-solid fa-user-doctor fa-2x text-pink"></i>
                    </div>
                    <h5 th:text="${doctor.name}">Dr. Name</h5>
                    <p class="text-muted mb-2" th:text="${doctor.department}">Department</p>
                    <p class="mb-2"><strong th:text="${doctor.qualification}">Qualification</strong></p>
                    <p class="mb-2">Experience: <span th:text="${doctor.experience}">0 yrs</span></p>
                    <p class="mb-2">Fee: ₹<span th:text="${doctor.consultationFee}">0</span></p>
                    <p class="mb-2">Available: <span th:text="${doctor.availableDays}">Days</span></p>
                    <p class="mb-2">Time: <span th:text="${doctor.availableTime}">Time</span></p>
                    <p class="mb-2">Phone: <span th:text="${doctor.phoneNumber}">Phone</span></p>
                    <p class="mb-3">Email: <span th:text="${doctor.email}">Email</span></p>
                    <a th:href="@{'/admin/doctors/edit/' + ${doctor.id}}" class="btn btn-outline-pink btn-sm me-2">Edit</a>
                    <a th:href="@{'/admin/doctors/delete/' + ${doctor.id}}" class="btn btn-danger btn-sm">Delete</a>
                </div>
            </div>
        </div>
    </main>
</div>
<script src="/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>

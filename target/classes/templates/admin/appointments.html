<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Appointments - BloomCare Admin</title>
    <link rel="stylesheet" href="/webjars/bootstrap/5.3.2/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="/webjars/font-awesome/6.5.2/css/all.min.css"/>
    <link rel="stylesheet" href="/css/styles.css"/>
</head>
<body>
<div class="admin-layout">
    <aside class="sidebar bg-glass shadow-soft">
        <div class="sidebar-brand mb-5">
            <h4>BloomCare</h4>
            <p>Admin Panel</p>
        </div>
        <ul class="sidebar-nav list-unstyled">
            <li><a href="/admin/dashboard"><i class="fa-solid fa-chart-pie"></i> Dashboard</a></li>
            <li><a href="/admin/patients"><i class="fa-solid fa-user-injured"></i> Patients</a></li>
            <li><a href="/admin/doctors"><i class="fa-solid fa-user-doctor"></i> Doctors</a></li>
            <li><a href="/admin/appointments"><i class="fa-solid fa-calendar-check"></i> Appointments</a></li>
            <li><a href="/logout"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>
        </ul>
    </aside>
    <main class="admin-main p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2>Appointment Management</h2>
                <p class="text-muted">Track appointments and update statuses.</p>
            </div>
            <a href="/admin/appointments/add" class="btn btn-pink">Book Appointment</a>
        </div>
        <div class="table-responsive rounded-4 shadow-soft bg-white p-3">
            <table class="table table-borderless align-middle mb-0">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Patient</th>
                    <th>Doctor</th>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="appointment : ${appointments}">
                    <td th:text="${appointment.id}">1</td>
                    <td th:text="${appointment.patientName}">Patient</td>
                    <td th:text="${appointment.doctorName}">Doctor</td>
                    <td th:text="${appointment.appointmentDate}">2026-01-01</td>
                    <td th:text="${appointment.appointmentTime}">10:00</td>
                    <td>
                        <span class="badge" th:classappend="${appointment.status == 'Confirmed'} ? 'bg-sky text-white' : ${appointment.status == 'Completed'} ? 'bg-success text-white' : ${appointment.status == 'Cancelled'} ? 'bg-danger text-white' : 'bg-warning text-dark'" th:text="${appointment.status}">Pending</span>
                    </td>
                    <td>
                        <a th:href="@{'/admin/appointments/edit/' + ${appointment.id}}" class="btn btn-sm btn-outline-pink me-2">Edit</a>
                        <a th:href="@{'/admin/appointments/delete/' + ${appointment.id}}" class="btn btn-danger btn-sm">Cancel</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
<script src="/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>

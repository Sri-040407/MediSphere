<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Edit Doctor - BloomCare Admin</title>
    <link rel="stylesheet" href="/webjars/bootstrap/5.3.2/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="/webjars/font-awesome/6.5.2/css/all.min.css"/>
    <link rel="stylesheet" href="/css/styles.css"/>
</head>
<body>
<div class="admin-layout">
    <aside class="sidebar bg-glass shadow-soft">
        <div class="sidebar-brand mb-5">
            <h4>BloomCare</h4>
            <p>Admin Panel</p>
        </div>
        <ul class="sidebar-nav list-unstyled">
            <li><a href="/admin/dashboard"><i class="fa-solid fa-chart-pie"></i> Dashboard</a></li>
            <li><a href="/admin/patients"><i class="fa-solid fa-user-injured"></i> Patients</a></li>
            <li><a href="/admin/doctors"><i class="fa-solid fa-user-doctor"></i> Doctors</a></li>
            <li><a href="/admin/appointments"><i class="fa-solid fa-calendar-check"></i> Appointments</a></li>
            <li><a href="/logout"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>
        </ul>
    </aside>
    <main class="admin-main p-4">
        <div class="mb-4">
            <h2>Edit Doctor</h2>
            <p class="text-muted">Update the selected doctor's profile.</p>
        </div>
        <div class="rounded-4 shadow-soft bg-white p-4">
            <form th:action="@{'/admin/doctors/update/' + ${doctor.id}}" th:object="${doctor}" method="post">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Name</label>
                        <input type="text" th:field="*{name}" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Department</label>
                        <input type="text" th:field="*{department}" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Qualification</label>
                        <input type="text" th:field="*{qualification}" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Experience</label>
                        <input type="text" th:field="*{experience}" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Consultation Fee</label>
                        <input type="number" step="0.01" th:field="*{consultationFee}" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Available Days</label>
                        <input type="text" th:field="*{availableDays}" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Available Time</label>
                        <input type="text" th:field="*{availableTime}" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Phone Number</label>
                        <input type="text" th:field="*{phoneNumber}" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Email</label>
                        <input type="email" th:field="*{email}" class="form-control">
                    </div>
                </div>
                <div class="mt-4">
                    <button type="submit" class="btn btn-pink">Update Doctor</button>
                    <a href="/admin/doctors" class="btn btn-outline-secondary ms-2">Cancel</a>
                </div>
            </form>
        </div>
    </main>
</div>
<script src="/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>

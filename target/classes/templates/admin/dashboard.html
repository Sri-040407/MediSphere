<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Admin Dashboard - BloomCare</title>
    <link rel="stylesheet" href="/webjars/bootstrap/5.3.2/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="/webjars/font-awesome/6.5.2/css/all.min.css"/>
    <link rel="stylesheet" href="/css/styles.css"/>
</head>
<body>
<div class="admin-layout">
    <aside class="sidebar bg-glass shadow-soft">
        <div class="sidebar-brand mb-5">
            <h4>BloomCare</h4>
            <p>Admin Panel</p>
        </div>
        <ul class="sidebar-nav list-unstyled">
            <li><a href="/admin/dashboard"><i class="fa-solid fa-chart-pie"></i> Dashboard</a></li>
            <li><a href="/admin/patients"><i class="fa-solid fa-user-injured"></i> Patients</a></li>
            <li><a href="/admin/doctors"><i class="fa-solid fa-user-doctor"></i> Doctors</a></li>
            <li><a href="/admin/appointments"><i class="fa-solid fa-calendar-check"></i> Appointments</a></li>
            <li><a href="/logout"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>
        </ul>
    </aside>
    <main class="admin-main p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2>Dashboard</h2>
                <p class="text-muted">Overview of patients, doctors, and appointments.</p>
            </div>
        </div>
        <div class="row g-4">
            <div class="col-md-6 col-lg-3">
                <div class="dashboard-card rounded-4 shadow-soft p-4 bg-white">
                    <div class="d-flex align-items-center mb-3"><i class="fa-solid fa-hospital-user fa-2x text-pink"></i><span class="ms-auto text-muted">Total Patients</span></div>
                    <h3 th:text="${totalPatients}">0</h3>
                </div>
            </div>
            <div class="col-md-6 col-lg-3">
                <div class="dashboard-card rounded-4 shadow-soft p-4 bg-white">
                    <div class="d-flex align-items-center mb-3"><i class="fa-solid fa-user-doctor fa-2x text-sky"></i><span class="ms-auto text-muted">Total Doctors</span></div>
                    <h3 th:text="${totalDoctors}">0</h3>
                </div>
            </div>
            <div class="col-md-6 col-lg-3">
                <div class="dashboard-card rounded-4 shadow-soft p-4 bg-white">
                    <div class="d-flex align-items-center mb-3"><i class="fa-solid fa-calendar-day fa-2x text-mint"></i><span class="ms-auto text-muted">Today's Appointments</span></div>
                    <h3 th:text="${todayAppointments}">0</h3>
                </div>
            </div>
            <div class="col-md-6 col-lg-3">
                <div class="dashboard-card rounded-4 shadow-soft p-4 bg-white">
                    <div class="d-flex align-items-center mb-3"><i class="fa-solid fa-check-circle fa-2x text-purple"></i><span class="ms-auto text-muted">Completed Appointments</span></div>
                    <h3 th:text="${completedAppointments}">0</h3>
                    <p class="text-success small">Active care metrics</p>
                </div>
            </div>
        </div>
        <div class="row g-4 mt-1">
            <div class="col-md-6 col-lg-4">
                <div class="dashboard-card rounded-4 shadow-soft p-4 bg-white">
                    <div class="d-flex align-items-center mb-3"><i class="fa-solid fa-hourglass-half fa-2x text-peach"></i><span class="ms-auto text-muted">Pending Appointments</span></div>
                    <h3 th:text="${pendingAppointments}">0</h3>
                </div>
            </div>
        </div>
    </main>
</div>
<script src="/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>

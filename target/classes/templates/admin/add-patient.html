<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Add Patient - BloomCare Admin</title>
    <link rel="stylesheet" href="/webjars/bootstrap/5.3.2/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="/webjars/font-awesome/6.5.2/css/all.min.css"/>
    <link rel="stylesheet" href="/css/styles.css"/>
</head>
<body>
<div class="admin-layout">
    <aside class="sidebar bg-glass shadow-soft">
        <div class="sidebar-brand mb-5">
            <h4>BloomCare</h4>
            <p>Admin Panel</p>
        </div>
        <ul class="sidebar-nav list-unstyled">
            <li><a href="/admin/dashboard"><i class="fa-solid fa-chart-pie"></i> Dashboard</a></li>
            <li><a href="/admin/patients"><i class="fa-solid fa-user-injured"></i> Patients</a></li>
            <li><a href="/admin/doctors"><i class="fa-solid fa-user-doctor"></i> Doctors</a></li>
            <li><a href="/admin/appointments"><i class="fa-solid fa-calendar-check"></i> Appointments</a></li>
            <li><a href="/logout"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>
        </ul>
    </aside>
    <main class="admin-main p-4">
        <div class="mb-4">
            <h2>Add Patient</h2>
            <p class="text-muted">Enter patient details below.</p>
        </div>
        <div class="rounded-4 shadow-soft bg-white p-4">
            <form th:action="@{/admin/patients/save}" th:object="${patient}" method="post">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Full Name</label>
                        <input type="text" th:field="*{fullName}" class="form-control" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Age</label>
                        <input type="number" th:field="*{age}" class="form-control" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Gender</label>
                        <select th:field="*{gender}" class="form-select" required>
                            <option value="Female">Female</option>
                            <option value="Male">Male</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Date of Birth</label>
                        <input type="date" th:field="*{dateOfBirth}" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Phone Number</label>
                        <input type="text" th:field="*{phoneNumber}" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Email</label>
                        <input type="email" th:field="*{email}" class="form-control" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Address</label>
                        <textarea th:field="*{address}" class="form-control" rows="2"></textarea>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Blood Group</label>
                        <input type="text" th:field="*{bloodGroup}" class="form-control">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Guardian Name</label>
                        <input type="text" th:field="*{guardianName}" class="form-control">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Emergency Contact</label>
                        <input type="text" th:field="*{emergencyContact}" class="form-control">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Medical History</label>
                        <textarea th:field="*{medicalHistory}" class="form-control" rows="3"></textarea>
                    </div>
                </div>
                <div class="mt-4">
                    <button type="submit" class="btn btn-pink">Save Patient</button>
                    <a href="/admin/patients" class="btn btn-outline-secondary ms-2">Cancel</a>
                </div>
            </form>
        </div>
    </main>
</div>
<script src="/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
